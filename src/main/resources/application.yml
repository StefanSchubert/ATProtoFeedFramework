# ATProtoFeedFramework Default Configuration
spring:
  application:
    name: atproto-feed-framework

  # JPA/Hibernate Configuration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Framework-specific properties
atproto:
  feed:
    # Using us-west endpoint - closest available to Europe (hosted on OVH US datacenter)
    # Alternative: wss://jetstream2.us-east.bsky.network/subscribe
    jetstream-url: ${JETSTREAM_URL:wss://jetstream2.us-west.bsky.network/subscribe}
    feed-id: ${FEED_ID:}
    reconnect:
      initial-delay-seconds: 1
      max-delay-seconds: 30
      max-attempts: 9999
    retry:
      max-attempts: 3
      backoff-intervals: [1s, 2s, 4s]
    cursor:
      ttl-hours: 1
      cleanup-interval-minutes: 15

# Spring Boot Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# Logging configuration
logging:
  level:
    root: INFO
    de.bluewhale.atprotofeed: INFO
    org.springframework: WARN
    org.hibernate: WARN
